services:
  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
    environment:
      - PORT=8080
      - SIDECAR_PORT=8090
      # Uncomment to auto-create admin:
      # - PB_ADMIN_EMAIL=admin@example.com
      # - PB_ADMIN_PASSWORD=change-me
      # Uncomment for production encryption:
      # - PB_ENCRYPTION_KEY=your-32-char-secret

volumes:
  pb_data:
    driver: local
